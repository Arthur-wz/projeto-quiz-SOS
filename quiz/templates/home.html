<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz SOS</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            position: relative;
            color: white;
            background: black;
        }

        /* vídeo de fundo */
        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* sombra leve */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.12);
            z-index: -1;
        }

        /* texto do topo */
        .hero {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 100%;
            z-index: 5;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        }

        .hero p {
            font-size: 1.4rem;
            margin-top: 8px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        }

        /* botão */
        .btn-jogar {
            position: fixed;
            bottom: 74px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff2b2b;
            color: white;
            text-decoration: none;
            padding: 27px 22px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.95rem;
            z-index: 10;
            transition: 0.3s ease;
        }

        .btn-jogar:hover {
            background: #cc0000;
            transform: translateX(-50%) scale(1.05);
        }

        /* celular */
        @media (max-width: 768px) {
            .hero {
                top: 18px;
            }

            .hero h1 {
                font-size: 3rem;
            }

            .hero p {
                font-size: 1.15rem;
            }

            .btn-jogar {
                bottom: 34px;
                padding: 11px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="{% static 'css/quiz-sos.mp4' %}" type="video/mp4">
        Seu navegador não conseguiu carregar o vídeo de fundo.
    </video>

    <div class="overlay"></div>

    

    <a href="/login/" class="btn-jogar">Fazer Login para Jogar</a>

</body>
</html>
