<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Adalberto da Silva Correia Junior">
    <title>Quiz SOS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .conteudo {
            position: relative;
            top: 50%;
            transform: translateY(-50%);
        }

        h1 {
            font-size: 3rem;
        }

        p {
            font-size: 1.5rem;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #00c3ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        a:hover {
            background: #008cff;
            transform: scale(1.05);
        }

        /* overlay escuro */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }
    </style>
</head>
<body>

{% load static %}

<video autoplay muted loop id="bg-video">
    <source src="{% static 'css/video/quiz SOS.mp4' %}" type="video/mp4">
</video>

<div class="conteudo">
    <h1>Quiz SOS</h1>
    <p>Teste seus conhecimentos!</p>
    <a href="/login/">Fazer Login para Jogar</a>
</div>

</body>
</html>
