<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz SOS</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.15);
            z-index: -1;
        }

        .conteudo {
            position: relative;
            z-index: 2;
            padding-top: 20px;
        }

        h1 {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.35);
        }

        p {
            font-size: 1.4rem;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.35);
        }

        .btn-jogar {
    position: fixed;
    bottom: 74px; /* desce mais */
    left: 50%;
    transform: translateX(-50%);
    padding: 28px 29px; /* menor e mais proporcional */
    background: #ff2b2b;
    color: white;
    text-decoration: none;
    border-radius: 64px; /* igual ao botão do vídeo */
    font-size: 0.95rem; /* menor */
    font-weight: bold;
    z-index: 10;
    transition: 0.3s;
}

.btn-jogar:hover {
    background: #cc0000;
    transform: translateX(-50%) scale(1.05);
}
        @media (max-width: 768px) {
            .conteudo {
                padding-top: 25px;
            }

            h1 {
                font-size: 3rem;
            }

            p {
                font-size: 1.1rem;
            }

            .btn-jogar {
                bottom: 100px;
                padding: 10px 26px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

<video autoplay muted loop playsinline preload="auto" id="bg-video">
    <source src="{% static 'css/video/quiz SOS.mp4' %}" type="video/mp4">
    Seu navegador não conseguiu carregar o vídeo de fundo.
</video>

<a href="/login/" class="btn-jogar">Fazer Login para Jogar</a>

</body>
</html>
