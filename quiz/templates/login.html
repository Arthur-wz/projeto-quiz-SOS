<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        background: rgba(0,0,0,0.6);
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 0 20px #00c3ff;
    }

    input {
        display: block;
        margin: 15px auto;
        padding: 10px;
        width: 250px;
        border-radius: 8px;
        border: none;
    }

    button {
        padding: 10px 20px;
        background: #00c3ff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #008cff;
    }
</style>
</head>
<body>

<div class="box">
    <h2>🎮 Login</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Usuário">
        <input type="password" name="password" placeholder="Senha">
        <button type="submit">Entrar</button>
    </form>

    {% if erro %}
        <p style="color:red;">{{ erro }}</p>
    {% endif %}
</div>

</body>
</html>
