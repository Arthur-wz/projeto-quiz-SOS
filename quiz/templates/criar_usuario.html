<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Usuário</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #001133, #000814);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 195, 255, 0.45);
            width: 460px;
            max-width: 90%;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 25px;
        }

        input {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            background: #d9dfeb;
            color: black;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: #19b5ea;
            color: black;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0c9fd1;
            transform: scale(1.02);
        }

        .voltar {
            display: inline-block;
            margin-top: 18px;
            color: #19b5ea;
            text-decoration: none;
            font-weight: bold;
        }

        .voltar:hover {
            text-decoration: underline;
        }

        .erro {
            color: #ff4d4d;
            margin-top: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Criar Usuário</h2>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Nome de usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <input type="password" name="confirmar_password" placeholder="Confirmar senha" required>
            <button type="submit">Cadastrar</button>
        </form>

        <a href="/login/" class="voltar">Voltar para login</a>

        {% if erro %}
            <p class="erro">{{ erro }}</p>
        {% endif %}
    </div>

</body>
</html>
